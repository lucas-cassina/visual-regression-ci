<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pricing</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; color: #1a1a1a; }
  header { background: #0f172a; color: #fff; padding: 24px 32px; }
  .wrap { padding: 48px 32px; max-width: 720px; }
  h1 { font-size: 36px; }
  /* REGRESSION (contrast): the price is now light grey on white — barely readable. */
  .price { font-size: 56px; font-weight: 800; color: #dcdcdc; margin: 16px 0; }
  .note { font-size: 16px; color: #475569; }
</style>
</head>
<body>
  <header>Acme Insurance</header>
  <section class="wrap">
    <h1>Simple pricing</h1>
    <div class="price">$29/mo</div>
    <p class="note">Cancel anytime. Includes 24/7 support and full coverage.</p>
  </section>
</body>
</html>
