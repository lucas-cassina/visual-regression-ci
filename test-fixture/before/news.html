<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>News</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; color: #1a1a1a; }
  header { background: #0f172a; color: #fff; padding: 24px 32px; }
  .wrap { padding: 48px 32px; max-width: 720px; }
  h1 { font-size: 36px; margin: 0 0 24px; }
  /* Fixed-height card with overflow:hidden — looks intentional when content fits. */
  .card { background: #f1f5f9; border-radius: 12px; padding: 24px;
          height: 180px; overflow: hidden; }
  .card h2 { font-size: 22px; margin: 0 0 12px; color: #0f172a; line-height: 1.3; }
  .card p { font-size: 16px; line-height: 1.6; color: #334155; margin: 0; }
  .card .cta { display: inline-block; margin-top: 14px; color: #2563eb; font-weight: 600; }
</style>
</head>
<body>
  <header>Acme Insurance</header>
  <section class="wrap">
    <h1>News</h1>
    <article class="card">
      <h2>Welcome to Acme</h2>
      <p>Quick update on this month's plans.</p>
      <span class="cta">Read more →</span>
    </article>
  </section>
</body>
</html>
